name: attendance_app
description: "Offline Attendance Management System for professors"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.2
  path: ^1.9.0
  provider: ^6.1.2
  csv: ^6.0.0
  share_plus: ^10.0.0
  intl: ^0.19.0
  path_provider: ^2.1.3
  file_picker: ^8.1.0
  spreadsheet_decoder: ^2.3.0
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/excel_hint.png
